    <!-- ═══ MODALS ══════════════════════════════════════════════════ -->

    <!-- Status Requests Modal -->
    <div id="status-requests-modal" class="modal-overlay hidden">
      <div class="modal w-full max-w-5xl mx-4">
        <div
          class="p-6 border-b border-slate-100 flex items-center justify-between"
        >
          <div>
            <h3
              id="status-modal-title"
              class="font-display font-bold text-lg text-slate-800"
            >
              Submitted Requests
            </h3>
            <p id="status-modal-subtitle" class="text-sm text-slate-400 mt-0.5">
              View and manage requests by status
            </p>
          </div>
          <div class="flex items-center gap-2">
            <button
              onclick="closeModal('status-requests-modal', event)"
              class="text-slate-400 hover:text-slate-600 transition-colors"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="2"
                stroke="currentColor"
                class="w-5 h-5"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M6 18L18 6M6 6l12 12"
                />
              </svg>
            </button>
          </div>
        </div>
        <div id="status-requests-content" class="p-6"></div>
        <div class="p-6 border-t border-slate-100 flex justify-end">
          <button
            onclick="closeModal('status-requests-modal', event)"
            class="btn btn-secondary"
          >
            Close
          </button>
        </div>
      </div>
    </div>
