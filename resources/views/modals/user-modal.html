    <!-- User Modal -->
    <div id="user-modal" class="modal-overlay hidden">
      <div class="modal w-full max-w-xl mx-4">
        <div
          class="p-6 border-b border-slate-100 flex items-center justify-between"
        >
          <div>
            <h3
              id="user-modal-title"
              class="font-display font-bold text-lg text-slate-800"
            >
              Add New User
            </h3>
            <p id="user-modal-subtitle" class="text-sm text-slate-400 mt-0.5">
              Fill in the user details below
            </p>
          </div>
          <button
            onclick="closeModal('user-modal')"
            class="text-slate-400 hover:text-slate-600 transition-colors"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="2"
              stroke="currentColor"
              class="w-5 h-5"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M6 18L18 6M6 6l12 12"
              />
            </svg>
          </button>
        </div>
        <form
          id="user-form"
          onsubmit="handleSaveUser(event)"
          class="p-6 space-y-4"
          style="max-height: 78vh; overflow-y: auto"
        >
          <input type="hidden" id="user-id" value="" />
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="form-label"
                >First Name <span class="text-red-500">*</span></label
              ><input
                type="text"
                id="user-firstname"
                class="form-input"
                placeholder="Juan"
                required
              />
            </div>
            <div>
              <label class="form-label"
                >Last Name <span class="text-red-500">*</span></label
              ><input
                type="text"
                id="user-lastname"
                class="form-input"
                placeholder="dela Cruz"
                required
              />
            </div>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="form-label"
                >Employee ID <span class="text-red-500">*</span></label
              ><input
                type="text"
                id="user-empid"
                class="form-input"
                placeholder="EMP004"
                required
              />
            </div>
            <div>
              <label class="form-label">Department</label>
              <select id="user-dept" class="form-input">
                <option value="">Select...</option>
                <option>MPC</option>
                <option>IT</option>
                <option>Purchasing</option>
                <option>Accounting</option>
                <option>Warehouse</option>
                <option>Sales</option>
                <option>HR</option>
                <option>Operations</option>
                <option>Finance</option>
                <option>MDCU</option>
              </select>
            </div>
          </div>
          <div>
            <label class="form-label"
              >Email Address <span class="text-red-500">*</span></label
            ><input
              type="email"
              id="user-email"
              class="form-input"
              placeholder="juan.delacruz@cbkhardware.com"
              required
            />
          </div>
          <div>
            <label class="form-label"
              >Role <span class="text-red-500">*</span></label
            >
            <select id="user-role" class="form-input" required>
              <option value="">Select role...</option>
              <option value="requester">Requester</option>
              <option value="mpc_personnel">MPC Personnel</option>
              <option value="it_manager">IT Manager</option>
              <option value="senior_manager">Senior Manager</option>
              <option value="vp_operations">VP - Operations</option>
              <option value="admin">Admin</option>
            </select>
          </div>
          <div class="pt-1 border-t border-slate-100">
            <div class="mb-4">
              <label class="form-label" id="password-label"
                >Password <span class="text-red-500">*</span></label
              >
              <div class="relative">
                <input
                  type="password"
                  id="user-password"
                  class="form-input pr-10"
                  placeholder="Minimum 8 characters"
                />
                <button
                  type="button"
                  onclick="toggleUserPassword('user-password')"
                  class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="1.5"
                    stroke="currentColor"
                    class="w-4 h-4"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"
                    />
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                    />
                  </svg>
                </button>
              </div>
            </div>
            <div>
              <label class="form-label"
                >Confirm Password
                <span id="confirm-required" class="text-red-500">*</span></label
              >
              <div class="relative">
                <input
                  type="password"
                  id="user-password-confirm"
                  class="form-input pr-10"
                  placeholder="Re-enter password"
                />
                <button
                  type="button"
                  onclick="toggleUserPassword('user-password-confirm')"
                  class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="1.5"
                    stroke="currentColor"
                    class="w-4 h-4"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"
                    />
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                    />
                  </svg>
                </button>
              </div>
            </div>
          </div>
          <div
            id="user-status-row"
            class="hidden pt-1 border-t border-slate-100"
          >
            <label class="form-label">Account Status</label>
            <div class="flex gap-4 mt-2">
              <label
                class="flex items-center gap-2 cursor-pointer px-4 py-2 rounded-lg border border-slate-200 hover:border-green-400 transition-colors"
                ><input
                  type="radio"
                  name="user-status"
                  value="1"
                  checked
                  class="accent-green-600"
                /><span class="text-sm text-slate-700">Active</span></label
              >
              <label
                class="flex items-center gap-2 cursor-pointer px-4 py-2 rounded-lg border border-slate-200 hover:border-red-400 transition-colors"
                ><input
                  type="radio"
                  name="user-status"
                  value="0"
                  class="accent-red-600"
                /><span class="text-sm text-slate-700">Inactive</span></label
              >
            </div>
          </div>
          <div
            id="user-form-error"
            class="hidden p-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm"
          ></div>
          <div class="flex gap-3 pt-2">
            <button
              type="button"
              onclick="closeModal('user-modal')"
              class="btn btn-secondary flex-1 justify-center"
            >
              Cancel
            </button>
            <button type="submit" class="btn btn-primary flex-1 justify-center">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="2"
                stroke="currentColor"
                class="w-4 h-4"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
                />
              </svg>
              Save User
            </button>
          </div>
        </form>
      </div>
    </div>
