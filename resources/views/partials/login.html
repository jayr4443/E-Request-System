    <!-- ═══ LOGIN PAGE ══════════════════════════════════════════════ -->
    <div
      id="login-page"
      class="login-bg min-h-screen flex items-center justify-center p-4"
    >
      <div class="login-card w-full max-w-md p-10 animate-fade">
        <div class="flex items-center gap-3 mb-8">
          <div
            class="w-12 h-12 rounded-xl flex items-center justify-center text-white font-display font-bold text-lg"
            style="background: #1a228f"
          >
            CBK
          </div>
          <div>
            <div
              class="font-display font-bold text-gray-900 text-lg leading-tight"
            >
              Co Ban Kiat Hardware
            </div>
            <div
              class="text-xs text-gray-400 font-medium tracking-wide uppercase"
            >
              MPC Electronic Request System
            </div>
          </div>
        </div>
        <h1 class="font-display font-bold text-2xl text-gray-900 mb-1">
          Welcome back
        </h1>
        <p class="text-gray-500 text-sm mb-8">
          Sign in to access the MPC ERS portal
        </p>
        <form id="login-form" onsubmit="handleLogin(event)">
          <div class="mb-5">
            <label class="form-label">Email or Username</label>
            <input
              type="text"
              id="login-email"
              class="form-input"
              placeholder="your.email@cobankiat.com.ph or username"
              required
            />
          </div>
          <div class="mb-6">
            <label class="form-label">Password</label>
            <div class="relative">
              <input
                type="password"
                id="login-password"
                class="form-input pr-12"
                placeholder="Enter your password"
                required
              />
              <button
                type="button"
                onclick="togglePassword()"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600"
              >
                <svg
                  id="eye-icon"
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke-width="1.5"
                  stroke="currentColor"
                  class="w-5 h-5"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"
                  />
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                  />
                </svg>
              </button>
            </div>
          </div>
          <div
            id="login-error"
            class="hidden mb-4 p-3 rounded-lg text-sm"
            style="
              background: #fee2e2;
              border-left: 4px solid #ef4444;
              color: #991b1b;
            "
          ></div>
          <button
            type="submit"
            id="login-btn"
            class="btn btn-primary w-full justify-center text-base py-3"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="2"
              stroke="currentColor"
              class="w-5 h-5"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9"
              />
            </svg>
            Sign In
          </button>
        </form>
        <div class="mt-8 p-4 bg-blue-50 rounded-lg border border-blue-100">
          <!-- <p class="text-xs text-blue-700 font-medium mb-1">Demo Credentials</p> -->
          <p class="text-xs text-blue-600">admin@cbkhardware.com</p>
        </div>
        <p class="text-center text-xs text-gray-400 mt-6">
          © 2026 Co Ban Kiat Hardware Inc. All rights reserved.
        </p>
      </div>
    </div>
